name: Bug report
description: Report a reproducible storefront, API, accessibility, or deployment problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include customer records, Stripe data, credentials, or private Vercel values.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Storefront UI
        - Mobile or responsive design
        - Cart or checkout
        - Bulk or contact form
        - Accessibility
        - Performance
        - GitHub or Vercel deployment
        - Documentation
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Describe the observed behavior without including personal or secret information.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open…
        2. Select…
        3. Observe…
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or URL
  - type: input
    id: environment
    attributes:
      label: Browser, device, and viewport
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed customer data, payment information, tokens, and credentials.
          required: true

